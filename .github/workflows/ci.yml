name: Pilot CI

on:
  pull_request:
  push:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate_app:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

      - name: Setup Node
        uses: actions/setup-node@v6
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: App integrity gate
        run: npm run qa:app

  ai_quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

      - name: Setup Node
        uses: actions/setup-node@v6
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci

      - name: AI quality gate
        run: npm run qa:ai

      - name: Upload AI eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-ai-eval-report
          path: test-results/eval/qa-release-report.json
          if-no-files-found: ignore

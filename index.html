  <style>
    :root {
      --boot-bg: #111611;
      --boot-panel: rgba(25, 33, 28, 0.92);
      --boot-border: rgba(124, 140, 120, 0.18);
      --boot-line: rgba(246, 243, 242, 0.12);
      --boot-line-strong: rgba(246, 243, 242, 0.18);
      --boot-accent: rgba(3, 209, 168, 0.18);
      --boot-accent-soft: rgba(242, 251, 90, 0.1);
      --boot-copy: rgba(246, 243, 242, 0.72);
    }

    @keyframes bootShimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    @keyframes bootGlow {
      0%, 100% { opacity: 0.55; transform: scale(1); }
      50% { opacity: 0.85; transform: scale(1.04); }
    }

    .boot-shell {
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 12% 18%, rgba(3, 209, 168, 0.08), transparent 30%),
        radial-gradient(circle at 88% 12%, rgba(242, 251, 90, 0.06), transparent 24%),
        linear-gradient(180deg, rgba(22, 29, 24, 0.98), rgba(14, 18, 15, 0.98));
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    }

    .boot-nav {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 24px;
    }

    .boot-nav__cluster {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .boot-mark {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background:
        linear-gradient(135deg, rgba(3, 209, 168, 0.28), rgba(242, 251, 90, 0.16));
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.02) inset;
    }

    .boot-line {
      border-radius: 999px;
      background: linear-gradient(90deg, var(--boot-line) 0%, var(--boot-line-strong) 50%, var(--boot-line) 100%);
      background-size: 220% 100%;
      animation: bootShimmer 1.8s ease-in-out infinite;
    }

    .boot-main {
      max-width: 1080px;
      margin: 0 auto;
      padding: 40px 24px 52px;
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(320px, 0.85fr);
      gap: 24px;
    }

    .boot-hero,
    .boot-side {
      position: relative;
      border-radius: 24px;
      border: 1px solid var(--boot-border);
      background: var(--boot-panel);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.18);
      backdrop-filter: blur(10px);
    }

    .boot-hero {
      padding: 28px 28px 24px;
      min-height: 296px;
    }

    .boot-side {
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      justify-content: space-between;
      min-height: 296px;
    }

    .boot-hero__eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font: 600 11px/1.2 system-ui, sans-serif;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--boot-copy);
      margin-bottom: 18px;
    }

    .boot-hero__eyebrow::before {
      content: '';
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: rgba(3, 209, 168, 0.72);
      box-shadow: 0 0 18px rgba(3, 209, 168, 0.4);
      animation: bootGlow 2.8s ease-in-out infinite;
    }

    .boot-hero__stack,
    .boot-side__stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .boot-card {
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(255, 255, 255, 0.02);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .boot-chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    .boot-chip {
      height: 30px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(242, 251, 90, 0.08), rgba(3, 209, 168, 0.12));
      border: 1px solid rgba(242, 251, 90, 0.16);
      animation: bootShimmer 2.2s ease-in-out infinite;
      background-size: 220% 100%;
    }

    @media (max-width: 860px) {
      .boot-main {
        grid-template-columns: 1fr;
        padding: 28px 18px 36px;
      }

      .boot-nav {
        padding: 0 18px;
      }

      .boot-hero,
      .boot-side {
        min-height: 0;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .boot-line,
      .boot-chip,
      .boot-hero__eyebrow::before {
        animation: none;
      }
    }
  </style>
</head>
